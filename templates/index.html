<!DOCTYPE HTML PUBLIC '-//W3C//DTD HTML 4.01 Transitional//EN'>
<html lang="ja">
  <head>
      <meta http-equiv='Content-Type' content='text/html; charset=utf-8'>
      <meta name='author' content='takuki matsuda'>
      <title>Grepper《グレッパー》</title>
      <link rel="stylesheet" type="text/css" href="/static/style.css">
      <script>
        // 検出処理を行う関数
        function detectLines() {
          // 入力されたテキストを取得
          var text = document.getElementById('sequenceA').value;
          // 入力されたキーワードを取得
          var keywords = Array.from(document.getElementsByName('sequenceB')).map(el => el.value);
          // テキストを行ごとに分割
          var lines = text.split('\n');
          // キーワードが含まれる行を抽出
          var matchingLines = lines.filter(line => keywords.some(keyword => line.includes(keyword)));
          // 結果を表示
          document.getElementById('results').innerText = matchingLines.join('\n');
          // フォームの送信を防ぐ
          return false; 
        }
      </script>
  </head>

  <body>
    <div id="top">
      <h1>
        <a class="link-k" href='/'>Grepper《グレッパー》</a>
      </h1>
      <span class="version">ver.1.0</span>
      &emsp;
      <span class="language-switcher">
        <a href='/en'>English</a> | Japanese
      </span>      
      <span class="blog">
         <a href='/blog'>| blog</a>
      </span>
      <hr>
    </div>

    <div id="form">
      <p>原文を以下のテキストフィールドにコピーしてください。</p>
      <p>検出処理はクライアント側(あなたのPC内)で行われるので、原文が外部に漏れる心配はありません。</p>
      <textarea name="sequenceA" id="sequenceA" rows="20" placeholder="文章全体をコピーしてください。"></textarea>

      <p>検出したいキーワードを以下に入力してください。</p>
      <div id="keywords">
        <textarea name="sequenceB" id="sequenceB" rows="1" placeholder="検出したいキーワードを入力してください。"></textarea>
      </div>
      <button onclick="addKeywordField()">＋</button>
      <!-- 新しいキーワードフィールドを追加する関数 -->
      <script>
        function addKeywordField() {
          var keywordsDiv = document.getElementById('keywords'); // キーワードのdivを取得
          var newKeywordField = document.createElement('textarea'); // 新しいtextarea要素を作成
          newKeywordField.name = 'sequenceB'; // 新しい要素の名前を設定
          newKeywordField.rows = '1'; // 新しい要素の行数を設定
          newKeywordField.placeholder = '検出したいキーワードを入力してください。'; // 新しい要素のプレースホルダーを設定
          keywordsDiv.appendChild(newKeywordField); // 新しい要素をdivに追加
        }
      </script>
      <!-- 新しいキーワードフィールドを追加する関数終了 -->
    
      <p><input type="submit" value="検出する" onclick="return detectLines();"></p>
    </div>
    <div id="statusBar" style="display: none;">
      処理中です。しばらくお待ちください...
    </div>
    <script>
      function detectLines() {
        // ステータスバーを表示
        document.getElementById('statusBar').style.display = 'block';

        // 非同期処理を開始
        setTimeout(function() {
          var text = document.getElementById('sequenceA').value;
          var keywords = Array.from(document.getElementsByName('sequenceB')).map(el => el.value);
          var lines = text.split('\n');
          var matchingLines = lines.filter(line => keywords.some(keyword => line.includes(keyword)));
          document.getElementById('results').innerText = matchingLines.join('\n');     
          // ステータスバーを非表示にする
          document.getElementById('statusBar').style.display = 'none';
        }, 0); // 0ミリ秒後に関数を実行
        return false;
        }

    </script>
    
    <div id="results" style="white-space: pre;">
      <!-- 結果を表示する場所 -->
    </div>

    <hr>

    <div id="news">
      <p>新着情報：</p>
      <ul>
        <li>2023-11-12　初代 Greppper 完成 (ver.1)</li>
      </ul>
    </div>

    <hr>

    <p class="modified-info">Last modified on Nov 28, 2023 by
      <a target='_blank' href='http://twitter.com/MackeyPhotos'>@MackeyPhotos</a>
    </p>

    <!-- 他のHTMLコンテンツ -->
  </body>
</html>
